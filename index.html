<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LOBA - Canlı İçecek Çarkı</title>
<style>
  * {
    -webkit-box-sizing: border-box;
    box-sizing: border-box;
  }
  body {
    margin: 0;
    padding: 10px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #032221;
    color: #f0f7f6;
    -webkit-tap-highlight-color: transparent;
  }

  #inAppWarning {
    display: none;
    background-color: #FFD54F;
    color: #003836;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 12px;
    text-align: center;
    font-weight: bold;
    font-size: 13px;
    border: 2px solid #ffffff;
  }

  .header {
    text-align: center;
    padding: 12px 8px;
    background: #004B49;
    border-radius: 12px;
    border: 2px solid #146B68;
    margin-bottom: 12px;
  }
  .logo-title {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 3px;
    color: #E8F5E9;
    margin: 0;
  }
  
  .info-banner {
    font-size: 12px;
    color: #A7FFEB;
    margin-top: 6px;
    line-height: 1.3;
    background-color: #002B29;
    padding: 6px 10px;
    border-radius: 15px;
    display: inline-block;
    border: 1px dashed #146B68;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    background-color: #003836;
    padding: 15px;
    border-radius: 12px;
    border: 1px solid #146B68;
    text-align: center;
  }
  
  .wheel-area {
    position: relative;
    margin: 0 auto;
    width: 280px;
  }
  .wheel-container {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 0 auto;
  }
  #wheelCanvas {
    width: 280px;
    height: 280px;
    border-radius: 50%;
    border: 3px solid #FFD54F;
    -webkit-transition: -webkit-transform 4s cubic-bezier(0.15, 0.99, 0.35, 1);
    transition: transform 4s cubic-bezier(0.15, 0.99, 0.35, 1);
  }
  .pointer {
    position: absolute;
    top: -10px;
    left: 50%;
    margin-left: -10px;
    width: 0;
    height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 18px solid #FFD54F;
    z-index: 10;
  }
  .btn-spin {
    margin-top: 15px;
    padding: 12px 24px;
    font-size: 16px;
    font-weight: bold;
    background-color: #FFD54F;
    color: #003836;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    width: 100%;
    max-width: 260px;
  }

  .result-popup {
    font-size: 16px;
    font-weight: bold;
    color: #A7FFEB;
    margin-top: 12px;
    min-height: 25px;
    text-align: center;
  }
</style>
</head>
<body>

<div id="inAppWarning">
  ⚠️ Tam deneyim için sağ üstteki butona basıp <u>"Safari'de Aç"</u> seçeneğini seçin.
</div>

<div class="header">
  <div class="logo-title">L O B A</div>
  <div class="info-banner">
    🤔 Ne içeceğine karar veremedin mi?<br><b>Çarkı çevir, keyfine bak! 🍹✨</b>
  </div>
</div>

<div class="container">
  <div class="wheel-area">
    <div class="pointer"></div>
    <div class="wheel-container">
      <canvas id="wheelCanvas" width="360" height="360"></canvas>
    </div>
    <button class="btn-spin" onclick="spinWheel()">🎲 ÇARKI ÇEVİR!</button>
    <div class="result-popup" id="resultText"></div>
  </div>
</div>

<script>
  var ua = navigator.userAgent || navigator.vendor || window.opera;
  if (ua.indexOf("WhatsApp") > -1 || ua.indexOf("FBAN") > -1 || ua.indexOf("FBAV") > -1) {
    document.getElementById("inAppWarning").style.display = "block";
  }

  var colors = [
    '#FFFFFF', '#FF8B94', '#FFD3B6', '#A0E7E5', '#FFAAA5',
    '#DCEDC1', '#FFD3E2', '#B39DDB', '#FFF59D', '#80DEEA',
    '#FFCC80', '#EF9A9A', '#C5E1A5', '#FFE082', '#80CBC4'
  ];

  var products = [
    "Redbull White Moctail %10 İndirimli", "Iced Berry Hibiscus Tea", "Mango Lemon Splash %10 İndirimli",
    "Apple lemonade", "Ube Latte", "Mango Yeşilçay",
    "Limonotu & Beyaz Şeftali %10 İndirimli", "Spiceberry", "Blueberry Lemonade",
    "Baristanın Sürprizi", "Elma & Papaya", "Strawberry Lemonade", "Iced Creamista Tiramisu Latte %10 İndirimli"
  ];

  var currentRotation = 0;

  function drawWheel() {
    var canvas = document.getElementById('wheelCanvas');
    if (!canvas || !canvas.getContext) return;
    var ctx = canvas.getContext('2d');
    var numSlices = products.length;
    var sliceAngle = (2 * Math.PI) / numSlices;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (var i = 0; i < numSlices; i++) {
      var angle = i * sliceAngle;
      
      ctx.beginPath();
      ctx.fillStyle = colors[i % colors.length];
      ctx.moveTo(180, 180);
      ctx.arc(180, 180, 180, angle, angle + sliceAngle);
      ctx.lineTo(180, 180);
      ctx.fill();
      ctx.stroke();

      ctx.save();
      ctx.translate(180, 180);
      ctx.rotate(angle + sliceAngle / 2);
      ctx.textAlign = "right";
      ctx.fillStyle = "#003836";
      ctx.font = "bold 14px Arial";
      
      var text = products[i];
      if(text.length > 15) text = text.substring(0, 13) + "..";
      ctx.fillText(text, 165, 4);
      ctx.restore();
    }

    ctx.beginPath();
    ctx.arc(180, 180, 35, 0, 2 * Math.PI);
    ctx.fillStyle = "#003836";
    ctx.fill();
    ctx.strokeStyle = "#FFD54F";
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.fillStyle = "#E8F5E9";
    ctx.font = "bold 14px Arial";
    ctx.textAlign = "center";
    ctx.fillText("LOBA", 180, 185);
  }

  function spinWheel() {
    var canvas = document.getElementById('wheelCanvas');
    var randomSpin = Math.floor(3600 + Math.random() * 3600);
    currentRotation += randomSpin;
    
    canvas.style.webkitTransform = 'rotate(' + currentRotation + 'deg)';
    canvas.style.transform = 'rotate(' + currentRotation + 'deg)';
    document.getElementById('resultText').innerText = "Çark dönüyor...";

    setTimeout(function() {
      var actualRotation = currentRotation % 360;
      var sliceAngle = 360 / products.length;
      var winningIndex = Math.floor((360 - (actualRotation % 360) + 270) % 360 / sliceAngle);
      document.getElementById('resultText').innerText = "🎉 Bugünün Lezzeti: " + products[winningIndex];
    }, 4000);
  }

  window.onload = function() {
    drawWheel();
  };
</script>

</body>
</html>
